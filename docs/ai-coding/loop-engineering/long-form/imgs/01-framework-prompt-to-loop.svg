<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      text{font-family:'PingFang SC','Noto Sans CJK SC','Helvetica Neue',Arial,sans-serif;letter-spacing:0;fill:#2D2D2D}
      .title{font-size:46px;font-weight:800}.sub{font-size:24px;fill:#6B6B6B}.label{font-size:25px;font-weight:700}.small{font-size:19px;fill:#6B6B6B}.tiny{font-size:16px;fill:#6B6B6B}
      .box{stroke:#2D2D2D;stroke-width:5;rx:28;ry:28}.thin{stroke:#2D2D2D;stroke-width:3}.dash{stroke-dasharray:10 10}.arrow{stroke:#2D2D2D;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;fill:none}.accent{fill:#E8655A}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2D2D2D"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="6" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/></filter>
    <pattern id="paper" width="36" height="36" patternUnits="userSpaceOnUse"><circle cx="4" cy="6" r="1" fill="#e9dccd" opacity="0.35"/><circle cx="28" cy="24" r="1" fill="#e9dccd" opacity="0.25"/></pattern>
  </defs>
  <rect width="1600" height="900" fill="#F5F0E8"/><rect width="1600" height="900" fill="url(#paper)"/>
  <text class="title" x="80" y="86">从 Prompt 到 Loop：四层演进坐标</text>
  
  <text class="sub" x="80" y="126">外层不替代内层，而是继续包裹和约束它</text>
  <rect class="box" x="90" y="230" width="300" height="210" fill="#FFD5C2" filter="url(#shadow)"/><text class="label" x="240" y="282" text-anchor="middle">Prompt</text><text class="small" x="240" y="318" text-anchor="middle">战术指令</text>
  <rect class="box" x="470" y="230" width="300" height="210" fill="#A8D8EA" filter="url(#shadow)"/><text class="label" x="620" y="282" text-anchor="middle">Context</text><text class="small" x="620" y="318" text-anchor="middle">可见 token</text>
  <rect class="box" x="850" y="230" width="300" height="210" fill="#B5E5CF" filter="url(#shadow)"/><text class="label" x="1000" y="282" text-anchor="middle">Harness</text><text class="small" x="1000" y="318" text-anchor="middle">运行脚手架</text>
  <rect class="box" x="1230" y="230" width="300" height="210" fill="#D5C6E0" filter="url(#shadow)"/><text class="label" x="1380" y="282" text-anchor="middle">Loop</text><text class="small" x="1380" y="318" text-anchor="middle">长期控制系统</text>
  <path class="arrow" marker-end="url(#arrow)" d="M395 335 H455"/><path class="arrow" marker-end="url(#arrow)" d="M775 335 H835"/><path class="arrow" marker-end="url(#arrow)" d="M1155 335 H1215"/>
  <text class="small" x="240" y="505" text-anchor="middle">角色 / 步骤 / few-shot</text><text class="small" x="620" y="505" text-anchor="middle">历史 / 工具 / 检索</text><text class="small" x="1000" y="505" text-anchor="middle">权限 / worktree / verifier</text><text class="small" x="1380" y="505" text-anchor="middle">trigger / state / human gate</text>
  <rect class="box" x="355" y="650" width="890" height="96" fill="#FFF8EE"/>
  <text class="label" x="800" y="710" text-anchor="middle">done 是断言，不是证明</text>
  <circle cx="415" cy="698" r="18" fill="#E8655A" stroke="#2D2D2D" stroke-width="4"/><circle cx="1185" cy="698" r="18" fill="#E8655A" stroke="#2D2D2D" stroke-width="4"/>

</svg>