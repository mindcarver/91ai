<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      text{font-family:'PingFang SC','Noto Sans CJK SC','Helvetica Neue',Arial,sans-serif;letter-spacing:0;fill:#2D2D2D}
      .title{font-size:46px;font-weight:800}.sub{font-size:24px;fill:#6B6B6B}.label{font-size:25px;font-weight:700}.small{font-size:19px;fill:#6B6B6B}.num{font-size:42px;font-weight:800;fill:#2D2D2D}
      .box{stroke:#2D2D2D;stroke-width:5;rx:28;ry:28}.thin{stroke:#2D2D2D;stroke-width:3}.dash{stroke-dasharray:10 10}.arrow{stroke:#2D2D2D;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;fill:none}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2D2D2D"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="6" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/></filter>
    <pattern id="paper" width="36" height="36" patternUnits="userSpaceOnUse"><circle cx="4" cy="6" r="1" fill="#e9dccd" opacity="0.35"/><circle cx="28" cy="24" r="1" fill="#e9dccd" opacity="0.25"/></pattern>
  </defs>
  <rect width="1600" height="900" fill="#F5F0E8"/><rect width="1600" height="900" fill="url(#paper)"/>
  <text class="title" x="80" y="86">Loop Engineering 投入成熟度：不要跳级</text>
  <text class="sub" x="80" y="126">从手动到无人值守，每一级都要先补齐上一级的债</text>
  
  <rect class="box" x="230" y="160" width="1140" height="86" fill="#FFF8EE"/>
  <text class="label" x="800" y="215" text-anchor="middle">先做 L1，再谈 L2/L3；跳级会把理解债、验证债、信任债同时签下来</text>
  <rect class="box" x="150" y="590" width="260" height="155" fill="#FFD5C2" filter="url(#shadow)"/>
  <text class="num" x="280" y="648" text-anchor="middle">L0</text>
  <text class="label" x="280" y="686" text-anchor="middle">手动</text>
  <text class="small" x="280" y="720" text-anchor="middle">跑一次看一次</text>
  <rect class="box" x="470" y="500" width="260" height="245" fill="#A8D8EA" filter="url(#shadow)"/>
  <text class="num" x="600" y="558" text-anchor="middle">L1</text>
  <text class="label" x="600" y="596" text-anchor="middle">只报告</text>
  <text class="small" x="600" y="630" text-anchor="middle">巡检 · 草稿</text>
  <text class="small" x="600" y="660" text-anchor="middle">不自动改代码</text>
  <rect class="box" x="790" y="380" width="260" height="365" fill="#B5E5CF" filter="url(#shadow)"/>
  <text class="num" x="920" y="438" text-anchor="middle">L2</text>
  <text class="label" x="920" y="476" text-anchor="middle">受保护修复</text>
  <text class="small" x="920" y="510" text-anchor="middle">worktree</text>
  <text class="small" x="920" y="540" text-anchor="middle">verifier</text>
  <text class="small" x="920" y="570" text-anchor="middle">低风险小改</text>
  <rect class="box" x="1110" y="250" width="260" height="495" fill="#D5C6E0" filter="url(#shadow)"/>
  <text class="num" x="1240" y="308" text-anchor="middle">L3</text>
  <text class="label" x="1240" y="346" text-anchor="middle">无人值守</text>
  <text class="small" x="1240" y="380" text-anchor="middle">24 小时响应</text>
  <text class="small" x="1240" y="410" text-anchor="middle">STATE 持久化</text>
  <text class="small" x="1240" y="440" text-anchor="middle">human gate</text>
  <path class="arrow" marker-end="url(#arrow)" d="M410 668 H455"/>
  <path class="arrow" marker-end="url(#arrow)" d="M730 622 H775"/>
  <path class="arrow" marker-end="url(#arrow)" d="M1050 562 H1095"/>
  <path class="thin dash" d="M150 775 H1370"/>
  <text class="small" x="800" y="825" text-anchor="middle">投入原则：每一步只加一个 block，每一步都验证失败成本仍可控</text>

</svg>