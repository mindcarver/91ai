<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      text{font-family:'PingFang SC','Noto Sans CJK SC','Helvetica Neue',Arial,sans-serif;letter-spacing:0;fill:#2D2D2D}
      .title{font-size:46px;font-weight:800}.sub{font-size:24px;fill:#6B6B6B}.label{font-size:25px;font-weight:700}.small{font-size:19px;fill:#6B6B6B}.tiny{font-size:16px;fill:#6B6B6B}.num{font-size:40px;font-weight:800;fill:#2D2D2D}
      .box{stroke:#2D2D2D;stroke-width:5;rx:28;ry:28}.thin{stroke:#2D2D2D;stroke-width:3}.dash{stroke-dasharray:10 10}.arrow{stroke:#2D2D2D;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;fill:none}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2D2D2D"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="6" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/></filter>
    <pattern id="paper" width="36" height="36" patternUnits="userSpaceOnUse"><circle cx="4" cy="6" r="1" fill="#e9dccd" opacity="0.35"/><circle cx="28" cy="24" r="1" fill="#e9dccd" opacity="0.25"/></pattern>
  </defs>
  <rect width="1600" height="900" fill="#F5F0E8"/><rect width="1600" height="900" fill="url(#paper)"/>
  <text class="title" x="80" y="86">治理 Runaway Iteration 的三层防线</text>
  <text class="sub" x="80" y="126">70-95% 失败率背景下，防线比乐观更可靠</text>
  
  <circle cx="800" cy="455" r="105" fill="#E8655A" stroke="#2D2D2D" stroke-width="5"/><text class="label" x="800" y="440" text-anchor="middle">runaway</text><text class="small" x="800" y="475" text-anchor="middle">无限迭代烧钱</text>
  <circle cx="800" cy="455" r="190" fill="none" stroke="#A8D8EA" stroke-width="28" opacity="0.75"/>
  <circle cx="800" cy="455" r="285" fill="none" stroke="#B5E5CF" stroke-width="28" opacity="0.75"/>
  <circle cx="800" cy="455" r="380" fill="none" stroke="#D5C6E0" stroke-width="28" opacity="0.75"/>
  <rect class="box" x="95" y="275" width="300" height="145" fill="#A8D8EA" filter="url(#shadow)"/>
  <text class="label" x="245" y="327" text-anchor="middle">Guardrails</text>
  <text class="small" x="245" y="367" text-anchor="middle">denylist</text>
  <text class="small" x="245" y="395" text-anchor="middle">allowlist</text>
  <text class="small" x="245" y="423" text-anchor="middle">read before write</text>
  <rect class="box" x="650" y="710" width="300" height="145" fill="#B5E5CF" filter="url(#shadow)"/>
  <text class="label" x="800" y="762" text-anchor="middle">Stop Conditions</text>
  <text class="small" x="800" y="802" text-anchor="middle">max attempts</text>
  <text class="small" x="800" y="830" text-anchor="middle">budget cap</text>
  <text class="small" x="800" y="858" text-anchor="middle">zero state change</text>
  <rect class="box" x="1205" y="275" width="300" height="145" fill="#D5C6E0" filter="url(#shadow)"/>
  <text class="label" x="1355" y="327" text-anchor="middle">Human Gates</text>
  <text class="small" x="1355" y="367" text-anchor="middle">approval</text>
  <text class="small" x="1355" y="395" text-anchor="middle">pause</text>
  <text class="small" x="1355" y="423" text-anchor="middle">escalation</text>
  <rect class="box" x="510" y="160" width="580" height="78" fill="#FFF8EE"/><text class="label" x="800" y="210" text-anchor="middle">失败会被下一轮继承，所以必须先装刹车</text>

</svg>