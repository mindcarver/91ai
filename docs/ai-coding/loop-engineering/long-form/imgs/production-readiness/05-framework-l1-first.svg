<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      text{font-family:'PingFang SC','Noto Sans CJK SC','Helvetica Neue',Arial,sans-serif;letter-spacing:0;fill:#2D2D2D}
      .title{font-size:46px;font-weight:800}.sub{font-size:24px;fill:#6B6B6B}.label{font-size:25px;font-weight:700}.small{font-size:19px;fill:#6B6B6B}.tiny{font-size:16px;fill:#6B6B6B}.num{font-size:40px;font-weight:800;fill:#2D2D2D}
      .box{stroke:#2D2D2D;stroke-width:5;rx:28;ry:28}.thin{stroke:#2D2D2D;stroke-width:3}.dash{stroke-dasharray:10 10}.arrow{stroke:#2D2D2D;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;fill:none}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2D2D2D"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="6" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/></filter>
    <pattern id="paper" width="36" height="36" patternUnits="userSpaceOnUse"><circle cx="4" cy="6" r="1" fill="#e9dccd" opacity="0.35"/><circle cx="28" cy="24" r="1" fill="#e9dccd" opacity="0.25"/></pattern>
  </defs>
  <rect width="1600" height="900" fill="#F5F0E8"/><rect width="1600" height="900" fill="url(#paper)"/>
  <text class="title" x="80" y="86">L0-L3 渐进上线：第一周只做 L1</text>
  <text class="sub" x="80" y="126">先验证发现问题、状态续命、团队愿意读输出</text>
  
  <rect class="box" x="125" y="585" width="260" height="150" fill="#FFD5C2" filter="url(#shadow)"/>
  <text class="label" x="255" y="637" text-anchor="middle">L0 手动</text>
  <text class="small" x="255" y="677" text-anchor="middle">跑一次</text>
  <text class="small" x="255" y="705" text-anchor="middle">看一次</text>
  <rect class="box" x="465" y="465" width="280" height="270" fill="#A8D8EA" filter="url(#shadow)"/>
  <text class="label" x="605" y="517" text-anchor="middle">L1 只报告</text>
  <text class="small" x="605" y="557" text-anchor="middle">Daily Triage</text>
  <text class="small" x="605" y="585" text-anchor="middle">更新 STATE.md</text>
  <text class="small" x="605" y="613" text-anchor="middle">不改代码</text>
  <rect class="box" x="825" y="360" width="280" height="375" fill="#B5E5CF" filter="url(#shadow)"/>
  <text class="label" x="965" y="412" text-anchor="middle">L2 保护修复</text>
  <text class="small" x="965" y="452" text-anchor="middle">worktree</text>
  <text class="small" x="965" y="480" text-anchor="middle">deterministic verifier</text>
  <text class="small" x="965" y="508" text-anchor="middle">低风险小改</text>
  <rect class="box" x="1185" y="235" width="280" height="500" fill="#D5C6E0" filter="url(#shadow)"/>
  <text class="label" x="1325" y="287" text-anchor="middle">L3 Governed</text>
  <text class="small" x="1325" y="327" text-anchor="middle">durable runtime</text>
  <text class="small" x="1325" y="355" text-anchor="middle">identity</text>
  <text class="small" x="1325" y="383" text-anchor="middle">human gates</text>
  <path class="arrow" marker-end="url(#arrow)" d="M390 660 H455"/><path class="arrow" marker-end="url(#arrow)" d="M750 610 H815"/><path class="arrow" marker-end="url(#arrow)" d="M1110 548 H1175"/>
  <rect class="box" x="430" y="165" width="740" height="88" fill="#FFF8EE"/><text class="label" x="800" y="220" text-anchor="middle">第一周的目标不是自动修复，而是校准系统</text>
  <path class="thin dash" d="M100 760 H1500"/>

</svg>