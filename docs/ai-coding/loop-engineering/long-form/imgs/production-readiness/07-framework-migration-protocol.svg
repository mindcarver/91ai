<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      text{font-family:'PingFang SC','Noto Sans CJK SC','Helvetica Neue',Arial,sans-serif;letter-spacing:0;fill:#2D2D2D}
      .title{font-size:46px;font-weight:800}.sub{font-size:24px;fill:#6B6B6B}.label{font-size:25px;font-weight:700}.small{font-size:19px;fill:#6B6B6B}.tiny{font-size:16px;fill:#6B6B6B}.num{font-size:40px;font-weight:800;fill:#2D2D2D}
      .box{stroke:#2D2D2D;stroke-width:5;rx:28;ry:28}.thin{stroke:#2D2D2D;stroke-width:3}.dash{stroke-dasharray:10 10}.arrow{stroke:#2D2D2D;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;fill:none}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2D2D2D"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="6" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/></filter>
    <pattern id="paper" width="36" height="36" patternUnits="userSpaceOnUse"><circle cx="4" cy="6" r="1" fill="#e9dccd" opacity="0.35"/><circle cx="28" cy="24" r="1" fill="#e9dccd" opacity="0.25"/></pattern>
  </defs>
  <rect width="1600" height="900" fill="#F5F0E8"/><rect width="1600" height="900" fill="url(#paper)"/>
  <text class="title" x="80" y="86">跨工具迁移：迁能力协议，不迁产品皮肤</text>
  <text class="sub" x="80" y="126">工具表面可换，协议顺序不能乱</text>
  
  <rect class="box" x="110" y="215" width="240" height="80" fill="#FFF8EE" filter="url(#shadow)"/><text class="label" x="230" y="264" text-anchor="middle">Claude Code</text><rect class="box" x="680" y="215" width="240" height="80" fill="#FFF8EE" filter="url(#shadow)"/><text class="label" x="800" y="264" text-anchor="middle">Codex</text><rect class="box" x="1250" y="215" width="240" height="80" fill="#FFF8EE" filter="url(#shadow)"/><text class="label" x="1370" y="264" text-anchor="middle">Cursor</text>
  <path class="thin dash" d="M160 345 H1440"/><text class="small" x="800" y="335" text-anchor="middle">product surface</text>
  <rect class="box" x="80" y="465" width="255" height="145" fill="#FFD5C2" filter="url(#shadow)"/>
  <text class="label" x="207.5" y="517" text-anchor="middle">1. skill 语义</text>
  <text class="small" x="207.5" y="557" text-anchor="middle">这条 loop 做什么</text>
  <rect class="box" x="380" y="465" width="255" height="145" fill="#A8D8EA" filter="url(#shadow)"/>
  <text class="label" x="507.5" y="517" text-anchor="middle">2. state schema</text>
  <text class="small" x="507.5" y="557" text-anchor="middle">怎么跨时间连续</text>
  <rect class="box" x="680" y="465" width="255" height="145" fill="#B5E5CF" filter="url(#shadow)"/>
  <text class="label" x="807.5" y="517" text-anchor="middle">3. verifier split</text>
  <text class="small" x="807.5" y="557" text-anchor="middle">谁证明完成</text>
  <rect class="box" x="980" y="465" width="255" height="145" fill="#D5C6E0" filter="url(#shadow)"/>
  <text class="label" x="1107.5" y="517" text-anchor="middle">4. scheduling</text>
  <text class="small" x="1107.5" y="557" text-anchor="middle">按什么节奏跑</text>
  <rect class="box" x="1280" y="465" width="255" height="145" fill="#E8655A" filter="url(#shadow)"/>
  <text class="label" x="1407.5" y="517" text-anchor="middle">5. 写权限</text>
  <text class="small" x="1407.5" y="557" text-anchor="middle">最后再打开</text>
  <path class="arrow" marker-end="url(#arrow)" d="M340 538 H370"/><path class="arrow" marker-end="url(#arrow)" d="M640 538 H670"/><path class="arrow" marker-end="url(#arrow)" d="M940 538 H970"/><path class="arrow" marker-end="url(#arrow)" d="M1240 538 H1270"/>
  <rect class="box" x="455" y="720" width="690" height="76" fill="#FFF8EE"/><text class="label" x="800" y="769" text-anchor="middle">先迁协议，最后才迁自动动作</text>

</svg>