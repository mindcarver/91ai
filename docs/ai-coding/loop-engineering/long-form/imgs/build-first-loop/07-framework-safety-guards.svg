<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      text{font-family:'PingFang SC','Noto Sans CJK SC','Helvetica Neue',Arial,sans-serif;letter-spacing:0;fill:#2D2D2D}
      .title{font-size:46px;font-weight:800}.sub{font-size:24px;fill:#6B6B6B}.label{font-size:25px;font-weight:700}.small{font-size:19px;fill:#6B6B6B}.tiny{font-size:16px;fill:#6B6B6B}.num{font-size:40px;font-weight:800;fill:#2D2D2D}
      .box{stroke:#2D2D2D;stroke-width:5;rx:28;ry:28}.thin{stroke:#2D2D2D;stroke-width:3}.dash{stroke-dasharray:10 10}.arrow{stroke:#2D2D2D;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;fill:none}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2D2D2D"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="6" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/></filter>
    <pattern id="paper" width="36" height="36" patternUnits="userSpaceOnUse"><circle cx="4" cy="6" r="1" fill="#e9dccd" opacity="0.35"/><circle cx="28" cy="24" r="1" fill="#e9dccd" opacity="0.25"/></pattern>
  </defs>
  <rect width="1600" height="900" fill="#F5F0E8"/><rect width="1600" height="900" fill="url(#paper)"/>
  <text class="title" x="80" y="86">运行安全护栏：denylist、max attempts、kill switch</text>
  <text class="sub" x="80" y="126">第一条 loop 先把刹车装好，再谈提速</text>
  
  <rect class="box" x="560" y="300" width="480" height="230" fill="#FFD5C2" filter="url(#shadow)"/><text class="label" x="800" y="365" text-anchor="middle">Daily Triage Runtime</text><text class="small" x="800" y="405" text-anchor="middle">L1：只更新 STATE.md 和 loop-runs/</text><text class="small" x="800" y="438" text-anchor="middle">allowlist 之外全部停下</text>
  <rect class="box" x="120" y="250" width="320" height="150" fill="#D5C6E0" filter="url(#shadow)"/>
  <text class="label" x="280" y="302" text-anchor="middle">denylist</text>
  <text class="small" x="280" y="342" text-anchor="middle">禁止路径</text>
  <text class="small" x="280" y="370" text-anchor="middle">禁止动作</text>
  <rect class="box" x="640" y="585" width="320" height="150" fill="#A8D8EA" filter="url(#shadow)"/>
  <text class="label" x="800" y="637" text-anchor="middle">max attempts</text>
  <text class="small" x="800" y="677" text-anchor="middle">连续出现</text>
  <text class="small" x="800" y="705" text-anchor="middle">升级或降噪</text>
  <rect class="box" x="1160" y="250" width="320" height="150" fill="#E8655A" filter="url(#shadow)"/>
  <text class="label" x="1320" y="302" text-anchor="middle">kill switch</text>
  <text class="small" x="1320" y="342" text-anchor="middle">budget 超限</text>
  <text class="small" x="1320" y="370" text-anchor="middle">status: paused</text>
  <text class="small" x="1320" y="398" text-anchor="middle">不自动恢复</text>
  <path class="arrow" marker-end="url(#arrow)" d="M445 325 H555"/><path class="arrow" marker-end="url(#arrow)" d="M800 580 V540"/><path class="arrow" marker-end="url(#arrow)" d="M1155 325 H1045"/>
  <rect class="box" x="445" y="755" width="710" height="70" fill="#FFF8EE"/><text class="label" x="800" y="800" text-anchor="middle">安全不是后补功能，是 loop 的运行边界</text>

</svg>