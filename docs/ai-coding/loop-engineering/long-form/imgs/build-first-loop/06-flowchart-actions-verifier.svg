<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      text{font-family:'PingFang SC','Noto Sans CJK SC','Helvetica Neue',Arial,sans-serif;letter-spacing:0;fill:#2D2D2D}
      .title{font-size:46px;font-weight:800}.sub{font-size:24px;fill:#6B6B6B}.label{font-size:25px;font-weight:700}.small{font-size:19px;fill:#6B6B6B}.tiny{font-size:16px;fill:#6B6B6B}.num{font-size:40px;font-weight:800;fill:#2D2D2D}
      .box{stroke:#2D2D2D;stroke-width:5;rx:28;ry:28}.thin{stroke:#2D2D2D;stroke-width:3}.dash{stroke-dasharray:10 10}.arrow{stroke:#2D2D2D;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;fill:none}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2D2D2D"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="6" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/></filter>
    <pattern id="paper" width="36" height="36" patternUnits="userSpaceOnUse"><circle cx="4" cy="6" r="1" fill="#e9dccd" opacity="0.35"/><circle cx="28" cy="24" r="1" fill="#e9dccd" opacity="0.25"/></pattern>
  </defs>
  <rect width="1600" height="900" fill="#F5F0E8"/><rect width="1600" height="900" fill="url(#paper)"/>
  <text class="title" x="80" y="86">GitHub Actions：把断言固化成可检查流程</text>
  <text class="sub" x="80" y="126">CI 不是装饰，是把报告型 loop 变成可审计系统</text>
  
  <rect class="box" x="75" y="315" width="200" height="140" fill="#FFD5C2" filter="url(#shadow)"/>
  <text class="label" x="175" y="367" text-anchor="middle">cron 09:00</text>
  <text class="small" x="175" y="407" text-anchor="middle">schedule</text>
  <rect class="box" x="325" y="315" width="200" height="140" fill="#A8D8EA" filter="url(#shadow)"/>
  <text class="label" x="425" y="367" text-anchor="middle">checkout</text>
  <text class="small" x="425" y="407" text-anchor="middle">repo state</text>
  <rect class="box" x="575" y="315" width="220" height="140" fill="#D5C6E0" filter="url(#shadow)"/>
  <text class="label" x="685" y="367" text-anchor="middle">claude --print</text>
  <text class="small" x="685" y="407" text-anchor="middle">Daily Triage</text>
  <rect class="box" x="845" y="315" width="220" height="140" fill="#B5E5CF" filter="url(#shadow)"/>
  <text class="label" x="955" y="367" text-anchor="middle">write outputs</text>
  <text class="small" x="955" y="407" text-anchor="middle">STATE.md</text>
  <text class="small" x="955" y="435" text-anchor="middle">loop-runs/</text>
  <rect class="box" x="1115" y="315" width="220" height="140" fill="#F7E3A1" filter="url(#shadow)"/>
  <text class="label" x="1225" y="367" text-anchor="middle">verify</text>
  <text class="small" x="1225" y="407" text-anchor="middle">report exists</text>
  <text class="small" x="1225" y="435" text-anchor="middle">state changed</text>
  <rect class="box" x="1385" y="315" width="150" height="140" fill="#FFF8EE" filter="url(#shadow)"/>
  <text class="label" x="1460" y="367" text-anchor="middle">commit</text>
  <text class="small" x="1460" y="407" text-anchor="middle">report only</text>
  <path class="arrow" marker-end="url(#arrow)" d="M280 385 H315"/><path class="arrow" marker-end="url(#arrow)" d="M530 385 H565"/><path class="arrow" marker-end="url(#arrow)" d="M800 385 H835"/><path class="arrow" marker-end="url(#arrow)" d="M1070 385 H1105"/><path class="arrow" marker-end="url(#arrow)" d="M1340 385 H1375"/>
  <rect class="box" x="450" y="610" width="700" height="86" fill="#FFF8EE"/><text class="label" x="800" y="665" text-anchor="middle">L1 proof：报告存在、状态变更、没有源代码 diff</text>

</svg>