<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><defs><style>text{font-family:'PingFang SC','Noto Sans CJK SC','Helvetica Neue',Arial,sans-serif;letter-spacing:0;fill:#2D2D2D}.title{font-size:46px;font-weight:800}.sub{font-size:24px;fill:#6B6B6B}.label{font-size:25px;font-weight:700}.small{font-size:19px;fill:#6B6B6B}.box{stroke:#2D2D2D;stroke-width:5;rx:28;ry:28}</style><filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="6" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/></filter><pattern id="paper" width="36" height="36" patternUnits="userSpaceOnUse"><circle cx="4" cy="6" r="1" fill="#e9dccd" opacity="0.35"/><circle cx="28" cy="24" r="1" fill="#e9dccd" opacity="0.25"/></pattern></defs><rect width="1600" height="900" fill="#F5F0E8"/><rect width="1600" height="900" fill="url(#paper)"/><text class="title" x="80" y="86">第一条 Daily Triage 的七个常见坑</text><text class="sub" x="80" y="126">先停、再查、再缩小范围</text>
  <rect class="box" x="75" y="205" width="310" height="145" fill="#E8655A" filter="url(#shadow)"/><text class="label" x="230" y="257" text-anchor="middle">cost runaway</text><text class="small" x="230" y="293" text-anchor="middle">cadence 太密</text><text class="small" x="230" y="319" text-anchor="middle">context 太大</text>
  <rect class="box" x="445" y="205" width="310" height="145" fill="#A8D8EA" filter="url(#shadow)"/><text class="label" x="600" y="257" text-anchor="middle">状态失忆</text><text class="small" x="600" y="293" text-anchor="middle">每轮从零开始</text>
  <rect class="box" x="815" y="205" width="310" height="145" fill="#F7E3A1" filter="url(#shadow)"/><text class="label" x="970" y="257" text-anchor="middle">通知噪音</text><text class="small" x="970" y="293" text-anchor="middle">P0 队列天天满</text>
  <rect class="box" x="1185" y="205" width="310" height="145" fill="#FFD5C2" filter="url(#shadow)"/><text class="label" x="1340" y="257" text-anchor="middle">no worktree</text><text class="small" x="1340" y="293" text-anchor="middle">L2 污染主分支</text>
  <rect class="box" x="255" y="430" width="310" height="145" fill="#D5C6E0" filter="url(#shadow)"/><text class="label" x="410" y="482" text-anchor="middle">maker 自评</text><text class="small" x="410" y="518" text-anchor="middle">说测试过但没跑</text>
  <rect class="box" x="645" y="430" width="310" height="145" fill="#B5E5CF" filter="url(#shadow)"/><text class="label" x="800" y="482" text-anchor="middle">scope creep</text><text class="small" x="800" y="518" text-anchor="middle">自动化范围蠕变</text>
  <rect class="box" x="1035" y="430" width="310" height="145" fill="#FFF8EE" filter="url(#shadow)"/><text class="label" x="1190" y="482" text-anchor="middle">VISION.md 过时</text><text class="small" x="1190" y="518" text-anchor="middle">旧优先级判断新 issue</text>
  <rect class="box" x="360" y="700" width="880" height="90" fill="#FFF8EE"/><text class="label" x="800" y="758" text-anchor="middle">恢复顺序：pause → inspect run log → shrink scope → resume manually</text>
</svg>