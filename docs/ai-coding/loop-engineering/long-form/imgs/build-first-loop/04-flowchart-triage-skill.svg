<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      text{font-family:'PingFang SC','Noto Sans CJK SC','Helvetica Neue',Arial,sans-serif;letter-spacing:0;fill:#2D2D2D}
      .title{font-size:46px;font-weight:800}.sub{font-size:24px;fill:#6B6B6B}.label{font-size:25px;font-weight:700}.small{font-size:19px;fill:#6B6B6B}.tiny{font-size:16px;fill:#6B6B6B}.num{font-size:40px;font-weight:800;fill:#2D2D2D}
      .box{stroke:#2D2D2D;stroke-width:5;rx:28;ry:28}.thin{stroke:#2D2D2D;stroke-width:3}.dash{stroke-dasharray:10 10}.arrow{stroke:#2D2D2D;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;fill:none}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2D2D2D"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="6" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/></filter>
    <pattern id="paper" width="36" height="36" patternUnits="userSpaceOnUse"><circle cx="4" cy="6" r="1" fill="#e9dccd" opacity="0.35"/><circle cx="28" cy="24" r="1" fill="#e9dccd" opacity="0.25"/></pattern>
  </defs>
  <rect width="1600" height="900" fill="#F5F0E8"/><rect width="1600" height="900" fill="url(#paper)"/>
  <text class="title" x="80" y="86">Triage Skill：从 GitHub 信号到四个队列</text>
  <text class="sub" x="80" y="126">客观信号优先，标题语义其次</text>
  
  <rect class="box" x="85" y="210" width="280" height="100" fill="#A8D8EA" filter="url(#shadow)"/>
  <text class="label" x="225" y="262" text-anchor="middle">gh issue list</text>
  <text class="small" x="225" y="302" text-anchor="middle">open issues</text>
  <rect class="box" x="85" y="345" width="280" height="100" fill="#A8D8EA" filter="url(#shadow)"/>
  <text class="label" x="225" y="397" text-anchor="middle">gh pr list</text>
  <text class="small" x="225" y="437" text-anchor="middle">open PRs</text>
  <rect class="box" x="85" y="480" width="280" height="100" fill="#A8D8EA" filter="url(#shadow)"/>
  <text class="label" x="225" y="532" text-anchor="middle">gh run list</text>
  <text class="small" x="225" y="572" text-anchor="middle">CI runs</text>
  <rect class="box" x="85" y="615" width="280" height="100" fill="#A8D8EA" filter="url(#shadow)"/>
  <text class="label" x="225" y="667" text-anchor="middle">git log</text>
  <text class="small" x="225" y="707" text-anchor="middle">24h commits</text>
  <rect class="box" x="555" y="345" width="330" height="200" fill="#D5C6E0" filter="url(#shadow)"/>
  <text class="label" x="720" y="397" text-anchor="middle">分类规则</text>
  <text class="small" x="720" y="437" text-anchor="middle">label / CI / stale</text>
  <text class="small" x="720" y="465" text-anchor="middle">watch_list 对比</text>
  <text class="small" x="720" y="493" text-anchor="middle">客观信号优先</text>
  <rect class="box" x="1070" y="185" width="300" height="100" fill="#E8655A" filter="url(#shadow)"/>
  <text class="label" x="1220" y="237" text-anchor="middle">P0 立即看</text>
  <text class="small" x="1220" y="277" text-anchor="middle">blocker / regression</text>
  <rect class="box" x="1070" y="320" width="300" height="100" fill="#FFD5C2" filter="url(#shadow)"/>
  <text class="label" x="1220" y="372" text-anchor="middle">P1 本周处理</text>
  <text class="small" x="1220" y="412" text-anchor="middle">bug / review</text>
  <rect class="box" x="1070" y="455" width="300" height="100" fill="#B5E5CF" filter="url(#shadow)"/>
  <text class="label" x="1220" y="507" text-anchor="middle">watch 观察项</text>
  <text class="small" x="1220" y="547" text-anchor="middle">stale / flaky</text>
  <rect class="box" x="1070" y="590" width="300" height="100" fill="#F7E3A1" filter="url(#shadow)"/>
  <text class="label" x="1220" y="642" text-anchor="middle">noise 忽略</text>
  <text class="small" x="1220" y="682" text-anchor="middle">duplicate / bot</text>
  <path class="arrow" marker-end="url(#arrow)" d="M370 260 H545"/><path class="arrow" marker-end="url(#arrow)" d="M370 395 H545"/><path class="arrow" marker-end="url(#arrow)" d="M370 530 H545"/><path class="arrow" marker-end="url(#arrow)" d="M370 665 H545"/><path class="arrow" marker-end="url(#arrow)" d="M890 405 H1060"/><path class="arrow" marker-end="url(#arrow)" d="M890 430 H1060"/><path class="arrow" marker-end="url(#arrow)" d="M890 455 H1060"/><path class="arrow" marker-end="url(#arrow)" d="M890 480 H1060"/>

</svg>