<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      text{font-family:'PingFang SC','Noto Sans CJK SC','Helvetica Neue',Arial,sans-serif;letter-spacing:0;fill:#2D2D2D}
      .title{font-size:46px;font-weight:800}.sub{font-size:24px;fill:#6B6B6B}.label{font-size:25px;font-weight:700}.small{font-size:19px;fill:#6B6B6B}.tiny{font-size:16px;fill:#6B6B6B}.num{font-size:40px;font-weight:800;fill:#2D2D2D}
      .box{stroke:#2D2D2D;stroke-width:5;rx:28;ry:28}.thin{stroke:#2D2D2D;stroke-width:3}.dash{stroke-dasharray:10 10}.arrow{stroke:#2D2D2D;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;fill:none}.accent{fill:#E8655A}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2D2D2D"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="6" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/></filter>
    <pattern id="paper" width="36" height="36" patternUnits="userSpaceOnUse"><circle cx="4" cy="6" r="1" fill="#e9dccd" opacity="0.35"/><circle cx="28" cy="24" r="1" fill="#e9dccd" opacity="0.25"/></pattern>
  </defs>
  <rect width="1600" height="900" fill="#F5F0E8"/><rect width="1600" height="900" fill="url(#paper)"/>
  <text class="title" x="80" y="86">六类失败模式：Loop 的生产风险雷达</text>
  <text class="sub" x="80" y="126">最危险的不是红灯报错，而是工具一直在响、状态没有变化</text>
  
  <g transform="translate(800 455)">
    <polygon points="0,-260 225,-130 225,130 0,260 -225,130 -225,-130" fill="#FFF8EE" stroke="#2D2D2D" stroke-width="4"/>
    <polygon points="0,-190 165,-95 165,95 0,190 -165,95 -165,-95" fill="none" stroke="#2D2D2D" stroke-width="3" opacity="0.35"/>
    <polygon points="0,-110 95,-55 95,55 0,110 -95,55 -95,-55" fill="none" stroke="#2D2D2D" stroke-width="3" opacity="0.25"/>
    <polygon points="0,-235 195,-82 128,122 0,210 -170,98 -205,-118" fill="#E8655A" opacity="0.22" stroke="#E8655A" stroke-width="5"/>
    <circle cx="0" cy="0" r="18" fill="#E8655A" stroke="#2D2D2D" stroke-width="4"/>
  </g>
  <rect class="box" x="600" y="165" width="400" height="82" fill="#FFD5C2" filter="url(#shadow)"/>
  <text class="label" x="800" y="217" text-anchor="middle">Infinite loops</text>
  
  <rect class="box" x="1045" y="275" width="355" height="82" fill="#A8D8EA" filter="url(#shadow)"/>
  <text class="label" x="1222.5" y="327" text-anchor="middle">Goal drift</text>
  
  <rect class="box" x="1045" y="548" width="355" height="82" fill="#B5E5CF" filter="url(#shadow)"/>
  <text class="label" x="1222.5" y="600" text-anchor="middle">Context overflow</text>
  
  <rect class="box" x="600" y="672" width="400" height="82" fill="#D5C6E0" filter="url(#shadow)"/>
  <text class="label" x="800" y="724" text-anchor="middle">Silent failures</text>
  
  <rect class="box" x="200" y="548" width="355" height="82" fill="#F7E3A1" filter="url(#shadow)"/>
  <text class="label" x="377.5" y="600" text-anchor="middle">Token cost explosion</text>
  
  <rect class="box" x="200" y="275" width="355" height="82" fill="#FFF8EE" filter="url(#shadow)"/>
  <text class="label" x="377.5" y="327" text-anchor="middle">Error propagation</text>
  
  <path class="thin" d="M800 195 V252"/><path class="thin" d="M1045 316 L990 355"/><path class="thin" d="M1045 590 L990 555"/>
  <path class="thin" d="M800 672 V632"/><path class="thin" d="M555 590 L610 555"/><path class="thin" d="M555 316 L610 355"/>
  <rect class="box" x="438" y="790" width="724" height="72" fill="#FFF8EE"/>
  <text class="label" x="800" y="837" text-anchor="middle">监控状态变化，而不只是监控工具调用</text>

</svg>