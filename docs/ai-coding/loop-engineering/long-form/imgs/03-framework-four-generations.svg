<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      text{font-family:'PingFang SC','Noto Sans CJK SC','Helvetica Neue',Arial,sans-serif;letter-spacing:0;fill:#2D2D2D}
      .title{font-size:46px;font-weight:800}.sub{font-size:24px;fill:#6B6B6B}.label{font-size:25px;font-weight:700}.small{font-size:19px;fill:#6B6B6B}.tiny{font-size:16px;fill:#6B6B6B}
      .box{stroke:#2D2D2D;stroke-width:5;rx:28;ry:28}.thin{stroke:#2D2D2D;stroke-width:3}.dash{stroke-dasharray:10 10}.arrow{stroke:#2D2D2D;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;fill:none}.accent{fill:#E8655A}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2D2D2D"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="6" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/></filter>
    <pattern id="paper" width="36" height="36" patternUnits="userSpaceOnUse"><circle cx="4" cy="6" r="1" fill="#e9dccd" opacity="0.35"/><circle cx="28" cy="24" r="1" fill="#e9dccd" opacity="0.25"/></pattern>
  </defs>
  <rect width="1600" height="900" fill="#F5F0E8"/><rect width="1600" height="900" fill="url(#paper)"/>
  <text class="title" x="80" y="86">四代智能体循环谱系</text>
  
  <text class="sub" x="80" y="126">轴心：从 agent 自己停，演进到外部 verifier 决定是否完成</text>
  <path class="arrow" marker-end="url(#arrow)" d="M165 445 H1435"/>
  <rect class="box" x="95" y="250" width="300" height="235" fill="#FFD5C2" filter="url(#shadow)"/><text class="label" x="245" y="302" text-anchor="middle">1 AutoGPT</text><text class="small" x="245" y="338" text-anchor="middle">2023 · 自己判断停止</text>
  <rect class="box" x="460" y="250" width="300" height="235" fill="#A8D8EA" filter="url(#shadow)"/><text class="label" x="610" y="302" text-anchor="middle">2 ReAct / Reflexion</text><text class="small" x="610" y="338" text-anchor="middle">2022-2023 · 推理与反思</text>
  <rect class="box" x="825" y="250" width="300" height="235" fill="#B5E5CF" filter="url(#shadow)"/><text class="label" x="975" y="302" text-anchor="middle">3 OODA / 多 agent</text><text class="small" x="975" y="338" text-anchor="middle">2024 · 策略 reset</text>
  <rect class="box" x="1190" y="250" width="300" height="235" fill="#D5C6E0" filter="url(#shadow)"/><text class="label" x="1340" y="302" text-anchor="middle">4 Loop Engineering</text><text class="small" x="1340" y="338" text-anchor="middle">2025-2026 · 外部验证</text>
  <text class="small" x="245" y="540" text-anchor="middle">context history</text><text class="small" x="610" y="540" text-anchor="middle">reasoning trace</text><text class="small" x="975" y="540" text-anchor="middle">multi-context</text><text class="small" x="1340" y="540" text-anchor="middle">STATE.md / stop hook</text>
  <rect class="box" x="430" y="650" width="740" height="95" fill="#FFF8EE"/><text class="label" x="800" y="708" text-anchor="middle">关键演进：退出权从 agent 手里移出</text>
  <text class="small" x="245" y="630" text-anchor="middle">10万 star 但失控</text><text class="small" x="610" y="630" text-anchor="middle">ALFWorld +34%</text><text class="small" x="975" y="630" text-anchor="middle">多 agent 约 15x token</text><text class="small" x="1340" y="630" text-anchor="middle">25h / 13M tokens / 30k lines</text>

</svg>