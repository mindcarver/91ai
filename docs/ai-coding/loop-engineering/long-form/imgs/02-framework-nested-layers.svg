<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      text{font-family:'PingFang SC','Noto Sans CJK SC','Helvetica Neue',Arial,sans-serif;letter-spacing:0;fill:#2D2D2D}
      .title{font-size:46px;font-weight:800}.sub{font-size:24px;fill:#6B6B6B}.label{font-size:25px;font-weight:700}.small{font-size:19px;fill:#6B6B6B}.tiny{font-size:16px;fill:#6B6B6B}
      .box{stroke:#2D2D2D;stroke-width:5;rx:28;ry:28}.thin{stroke:#2D2D2D;stroke-width:3}.dash{stroke-dasharray:10 10}.arrow{stroke:#2D2D2D;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;fill:none}.accent{fill:#E8655A}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2D2D2D"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="6" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/></filter>
    <pattern id="paper" width="36" height="36" patternUnits="userSpaceOnUse"><circle cx="4" cy="6" r="1" fill="#e9dccd" opacity="0.35"/><circle cx="28" cy="24" r="1" fill="#e9dccd" opacity="0.25"/></pattern>
  </defs>
  <rect width="1600" height="900" fill="#F5F0E8"/><rect width="1600" height="900" fill="url(#paper)"/>
  <text class="title" x="80" y="86">俄罗斯套娃结构：Prompt ⊂ Context ⊂ Harness ⊂ Loop</text>
  
  <rect class="box" x="180" y="160" width="980" height="620" fill="#D5C6E0"/>
  <rect class="box" x="250" y="230" width="840" height="480" fill="#B5E5CF"/>
  <rect class="box" x="320" y="300" width="700" height="340" fill="#A8D8EA"/>
  <rect class="box" x="390" y="370" width="560" height="200" fill="#FFD5C2"/>
  <text class="label" x="670" y="205" text-anchor="middle">Loop：触发 · 状态 · 停止 · 升级</text>
  <text class="label" x="670" y="275" text-anchor="middle">Harness：工具 · 权限 · worktree · 验证</text>
  <text class="label" x="670" y="345" text-anchor="middle">Context：系统消息 · 工具结果 · 历史 · 文档</text>
  <text class="label" x="670" y="455" text-anchor="middle">Prompt：当前回合指令</text>
  <rect class="box" x="1210" y="210" width="280" height="105" fill="#FFD5C2"/><text class="label" x="1350" y="268" text-anchor="middle">措辞天花板</text>
  <rect class="box" x="1210" y="370" width="280" height="105" fill="#A8D8EA"/><text class="label" x="1350" y="428" text-anchor="middle">上下文天花板</text>
  <rect class="box" x="1210" y="530" width="280" height="105" fill="#B5E5CF"/><text class="label" x="1350" y="588" text-anchor="middle">运行环境天花板</text>
  <path class="arrow" marker-end="url(#arrow)" d="M1160 265 H1195"/><path class="arrow" marker-end="url(#arrow)" d="M1090 425 H1195"/><path class="arrow" marker-end="url(#arrow)" d="M1020 585 H1195"/>

</svg>