<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      text{font-family:'PingFang SC','Noto Sans CJK SC','Helvetica Neue',Arial,sans-serif;letter-spacing:0;fill:#2D2D2D}
      .title{font-size:46px;font-weight:800}.sub{font-size:24px;fill:#6B6B6B}.label{font-size:25px;font-weight:700}.small{font-size:19px;fill:#6B6B6B}.tiny{font-size:16px;fill:#6B6B6B}.num{font-size:40px;font-weight:800;fill:#2D2D2D}
      .box{stroke:#2D2D2D;stroke-width:5;rx:28;ry:28}.thin{stroke:#2D2D2D;stroke-width:3}.dash{stroke-dasharray:10 10}.arrow{stroke:#2D2D2D;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;fill:none}.accent{fill:#E8655A}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2D2D2D"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="6" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/></filter>
    <pattern id="paper" width="36" height="36" patternUnits="userSpaceOnUse"><circle cx="4" cy="6" r="1" fill="#e9dccd" opacity="0.35"/><circle cx="28" cy="24" r="1" fill="#e9dccd" opacity="0.25"/></pattern>
  </defs>
  <rect width="1600" height="900" fill="#F5F0E8"/><rect width="1600" height="900" fill="url(#paper)"/>
  <text class="title" x="80" y="86">Loop 与相邻概念的边界图</text>
  <text class="sub" x="80" y="126">Goal 是终点，Workflow 是流程，Automation 是预设动作，Harness 是运行环境，Loop 是长期控制回路</text>
  
  <rect class="box" x="560" y="280" width="480" height="260" fill="#D5C6E0" filter="url(#shadow)"/>
  <text class="label" x="800" y="344" text-anchor="middle">Loop</text>
  <text class="small" x="800" y="388" text-anchor="middle">持续观测 · 判断 · 修正</text>
  <text class="small" x="800" y="420" text-anchor="middle">trigger / state / verifier / gate</text>
  <circle cx="800" cy="485" r="28" fill="#E8655A" stroke="#2D2D2D" stroke-width="5"/>
  <path class="arrow" marker-end="url(#arrow)" d="M800 457 A72 72 0 1 1 755 505"/>
  <rect class="box" x="90" y="210" width="320" height="150" fill="#FFD5C2" filter="url(#shadow)"/>
  <text class="label" x="250" y="262" text-anchor="middle">Goal</text>
  <text class="small" x="250" y="302" text-anchor="middle">一次完成条件</text>
  <text class="small" x="250" y="330" text-anchor="middle">run-until-done</text>
  <rect class="box" x="90" y="565" width="320" height="150" fill="#A8D8EA" filter="url(#shadow)"/>
  <text class="label" x="250" y="617" text-anchor="middle">Workflow</text>
  <text class="small" x="250" y="657" text-anchor="middle">固定步骤编排</text>
  <text class="small" x="250" y="685" text-anchor="middle">跑一次结束</text>
  <rect class="box" x="1190" y="210" width="320" height="150" fill="#B5E5CF" filter="url(#shadow)"/>
  <text class="label" x="1350" y="262" text-anchor="middle">Automation</text>
  <text class="small" x="1350" y="302" text-anchor="middle">预定义动作</text>
  <text class="small" x="1350" y="330" text-anchor="middle">失败显性报错</text>
  <rect class="box" x="1190" y="565" width="320" height="150" fill="#F7E3A1" filter="url(#shadow)"/>
  <text class="label" x="1350" y="617" text-anchor="middle">Harness</text>
  <text class="small" x="1350" y="657" text-anchor="middle">单次 run 环境</text>
  <text class="small" x="1350" y="685" text-anchor="middle">工具 · 权限 · 隔离</text>
  <path class="arrow" marker-end="url(#arrow)" d="M415 285 C510 285 510 345 555 365"/>
  <path class="arrow" marker-end="url(#arrow)" d="M415 640 C510 640 510 500 555 470"/>
  <path class="arrow" marker-end="url(#arrow)" d="M1185 285 C1090 285 1090 345 1045 365"/>
  <path class="arrow" marker-end="url(#arrow)" d="M1185 640 C1090 640 1090 500 1045 470"/>
  <rect class="box" x="424" y="680" width="752" height="92" fill="#FFF8EE"/>
  <text class="label" x="800" y="737" text-anchor="middle">判断标准：没有目标达成判断，就不是 loop</text>

</svg>