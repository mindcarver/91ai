<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      text{font-family:'PingFang SC','Noto Sans CJK SC','Helvetica Neue',Arial,sans-serif;letter-spacing:0;fill:#2D2D2D}
      .title{font-size:46px;font-weight:800}.sub{font-size:24px;fill:#6B6B6B}.label{font-size:25px;font-weight:700}.small{font-size:19px;fill:#6B6B6B}.tiny{font-size:16px;fill:#6B6B6B}
      .box{stroke:#2D2D2D;stroke-width:5;rx:28;ry:28}.thin{stroke:#2D2D2D;stroke-width:3}.dash{stroke-dasharray:10 10}.arrow{stroke:#2D2D2D;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;fill:none}.accent{fill:#E8655A}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2D2D2D"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="6" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/></filter>
    <pattern id="paper" width="36" height="36" patternUnits="userSpaceOnUse"><circle cx="4" cy="6" r="1" fill="#e9dccd" opacity="0.35"/><circle cx="28" cy="24" r="1" fill="#e9dccd" opacity="0.25"/></pattern>
  </defs>
  <rect width="1600" height="900" fill="#F5F0E8"/><rect width="1600" height="900" fill="url(#paper)"/>
  <text class="title" x="80" y="86">Harness 是 Loop 的地基</text>
  
  <text class="sub" x="80" y="126">先让仓库对 agent 可读、可查、可机械验证，再谈长期运行</text>
  <rect class="box" x="420" y="145" width="760" height="100" fill="#FFD5C2"/><text class="label" x="800" y="207" text-anchor="middle">Loop Engineering：长期运行逻辑</text>
  <rect class="box" x="230" y="330" width="310" height="280" fill="#A8D8EA"/><text class="label" x="385" y="400" text-anchor="middle">Legibility</text><text class="small" x="385" y="450" text-anchor="middle">agent 能读懂 repo</text>
  <rect class="box" x="645" y="330" width="310" height="280" fill="#B5E5CF"/><text class="label" x="800" y="400" text-anchor="middle">Repo-as-record</text><text class="small" x="800" y="450" text-anchor="middle">仓库是真实源</text>
  <rect class="box" x="1060" y="330" width="310" height="280" fill="#D5C6E0"/><text class="label" x="1215" y="400" text-anchor="middle">Mechanical</text><text class="label" x="1215" y="437" text-anchor="middle">enforcement</text><text class="small" x="1215" y="485" text-anchor="middle">规则升级成代码</text>
  <rect class="box" x="160" y="675" width="1280" height="92" fill="#FFF8EE"/><text class="label" x="800" y="730" text-anchor="middle">tests · lint · CI · worktree · verifier</text>
  <path class="arrow" d="M385 330 V260" marker-end="url(#arrow)"/><path class="arrow" d="M800 330 V260" marker-end="url(#arrow)"/><path class="arrow" d="M1215 330 V260" marker-end="url(#arrow)"/>
  <text class="small" x="800" y="825" text-anchor="middle">给 Codex 一张地图，不是 1000 页说明书</text>

</svg>